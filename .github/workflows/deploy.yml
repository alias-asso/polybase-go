name: Build and Deploy Polybase
on:
  push:
    branches: [ stable ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-polybase
  cancel-in-progress: false

env:
  TARGET_OS: "openbsd"
  TARGET_ARCH: "amd64"
  TARGET_FOLDER: "target"

jobs:
  build:
    name: Build polybase package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install just and scdoc
        run: sudo apt install -y just scdoc

      - name: Install deps
        run: bun i

      - name: Build and publish
        run: just publish

      - name: Upload build result
        uses: actions/upload-artifact@v6
        with:
          name: result
          path: ${{ env.TARGET_FOLDER }}/

  deploy:
    name: Deploy to openbsd server
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build result
        uses: actions/download-artifact@v6
        with:
          name: result
          path: ${{ env.TARGET_FOLDER }}/

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}

      - name: Deploy to server
        run: |
          scp -r $TARGET_FOLDER/* ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOSTNAME }}:/tmp/
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOSTNAME }} 'cd /tmp && sh install.sh'
