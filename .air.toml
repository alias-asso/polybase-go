root = "."
tmp_dir = "target/cache"

[build]
cmd = "go build -o target/cache/polybased ./polybased"
full_bin = "./target/cache/polybased -c polybase.cfg -dev"
include_ext = ["go", "templ", "css"]
exclude_dir = ["target"]
exclude_regex = ["_templ\\.go$"]
delay = 100
stop_on_error = true
send_interrupt = true

[log]
time = false
main_only = true

[screen]
clear_on_rebuild = true
